# name|dataset|label|schedule|keep|slack|flags
#
# schedule tokens understood by the dispatcher:
#   -H0  -M0     once per day at 00:00
#   -H*  -M0     once per hour at HH:00
#   -H*  -M/15   every 15 minutes (00,15,30,45)
# slack: how late after the slot start the job may still fire (e.g. 1h, 1d).
# flags: 'r' = recursive snapshot.
daily-root|zroot/ROOT/gentoo|auto-daily-$(%Y%m%d)|-H0 -M0|14|1d|r
hourly-home|zroot/home|auto-hourly-$(%Y%m%d-%H%M)|-H* -M0|24|1h|-
daily-home|zroot/home|auto-daily-$(%Y%m%d)|-H0 -M0|14|1d|-
